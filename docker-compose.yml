version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops-example-backend
    networks:
      - devops-example-network
    expose:
      - "8080"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: devops-example-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - devops-example-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  devops-example-network:
    name: devops-example-network
    driver: bridge
